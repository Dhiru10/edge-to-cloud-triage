spring:
  application:
    name: triage-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/triagedb}
    username: ${SPRING_DATASOURCE_USERNAME:triage}
    password: ${SPRING_DATASOURCE_PASSWORD:triage_dev_pw}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  api-key: ${APP_API_KEY:dev-api-key-change-in-prod}

server:
  port: 8080
