version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: triagedb
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d triagedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/triagedb
      SPRING_DATASOURCE_USERNAME: triage
      SPRING_DATASOURCE_PASSWORD: triage_dev_pw
      APP_API_KEY: dev-api-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  ai-triage-agent:
    build:
      context: ../ai-triage-agent
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8080
      API_KEY: dev-api-key-change-in-prod
      POLL_INTERVAL_SECONDS: 10
      STALE_THRESHOLD_MINUTES: 10
    depends_on:
      - backend

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
